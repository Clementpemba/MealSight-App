<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealSight</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#2563eb,#1e3a8a);
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            text-align:center;
            max-width:700px;
            padding:40px;
        }

        h1{
            font-size:60px;
            margin-bottom:10px;
        }

        p{
            font-size:20px;
            line-height:1.6;
            margin-bottom:40px;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
        }

        a{
            text-decoration:none;
        }

        .btn{
            padding:15px 30px;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .signup{
            background:white;
            color:#2563eb;
        }

        .login{
            background:transparent;
            border:2px solid white;
            color:white;
        }

        .btn:hover{
            transform:scale(1.05);
        }

    </style>
</head>
<body>

<div class="container">

    <h1>MealSight</h1>

    <p>
        AI-powered nutrition tracking system for children.
        Monitor meals, nutrition, and growth in real time.
    </p>

    <div class="buttons">

        <a href="register.html">
            <div class="btn signup">Sign Up</div>
        </a>

        <a href="login.html">
            <div class="btn login">Login</div>
        </a>

    </div>

</div>

</body>
</html>
