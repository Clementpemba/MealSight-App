<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MealSight | Smart Nutrition Login</title>
    
    <!-- Google Fonts + Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2b4d 0%, #1a4a7a 50%, #0e2a4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background pattern */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><path fill="white" d="M20,30 L30,20 L40,30 L30,40 Z M70,70 L80,60 L90,70 L80,80 Z M45,75 L55,65 L65,75 L55,85 Z"/><circle cx="85" cy="25" r="6"/><circle cx="15" cy="75" r="8"/></svg>');
            background-repeat: repeat;
            opacity: 0.12;
            pointer-events: none;
        }

        /* Floating food icons decoration */
        .floating-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 12s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            padding: 40px 38px;
            width: 460px;
            max-width: 92%;
            border-radius: 48px;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 10;
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.3);
        }

        /* Logo & header area */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            background: linear-gradient(145deg, #2563eb, #1e40af);
            width: 70px;
            height: 70px;
            border-radius: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .card h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f2b4d, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .tagline {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* Signup link line */
        .auth-switch {
            text-align: center;
            margin-bottom: 28px;
            font-size: 0.9rem;
            color: #4b5563;
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 60px;
        }

        .auth-switch a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
            margin-left: 6px;
            transition: all 0.2s;
        }

        .auth-switch a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        /* Input groups with icons */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            transition: color 0.2s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px 15px 48px;
            font-size: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 60px;
            background: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            font-weight: 500;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .input-group input:focus + i {
            color: #3b82f6;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border: none;
            background: linear-gradient(95deg, #2563eb, #3b82f6);
            color: white;
            border-radius: 60px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.25s;
            box-shadow: 0 10px 18px rgba(37, 99, 235, 0.3);
        }

        .login-btn i {
            font-size: 1rem;
        }

        .login-btn:hover {
            background: linear-gradient(95deg, #1d4ed8, #2563eb);
            transform: scale(0.98);
            box-shadow: 0 5px 12px rgba(37, 99, 235, 0.4);
        }

        /* result pre block - modern */
        .result-container {
            margin-top: 20px;
            border-radius: 24px;
            overflow: hidden;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        pre {
            background: #0f172a;
            color: #a5f3c3;
            padding: 16px;
            border-radius: 20px;
            overflow-x: auto;
            font-size: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }

        .footer-note a {
            color: #2563eb;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .card {
                padding: 30px 24px;
            }
            .card h2 {
                font-size: 28px;
            }
            .input-group input {
                padding: 13px 18px 13px 44px;
            }
        }
    </style>
</head>
<body>

<!-- Decorative floating food elements (purely aesthetic) -->
<div class="floating-icon" style="top: 12%; left: 8%; animation-duration: 14s;"><i class="fas fa-apple-alt"></i></div>
<div class="floating-icon" style="bottom: 15%; right: 5%; animation-duration: 18s; opacity: 0.12;"><i class="fas fa-carrot"></i></div>
<div class="floating-icon" style="top: 25%; right: 12%; animation-duration: 11s; font-size: 2.5rem;"><i class="fas fa-utensils"></i></div>
<div class="floating-icon" style="bottom: 20%; left: 12%; animation-duration: 16s;"><i class="fas fa-leaf"></i></div>

<div class="card">
    <div class="logo-area">
        <div class="logo-icon">
            <i class="fas fa-robot"></i>
        </div>
        <h2>MealSight</h2>
        <div class="tagline">AI-powered nutrition intelligence</div>
    </div>

    <div class="auth-switch">
        <i class="fas fa-heartbeat" style="color:#3b82f6;"></i> New to MealSight?
        <a href="register.html">Create account →</a>
    </div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="login-btn" onclick="login()">
        <i class="fas fa-arrow-right-to-bracket"></i> Login to Dashboard
    </button>

    <div class="result-container" id="resultContainer" style="display: none;">
        <pre id="result"></pre>
    </div>

    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> Secure access · <a href="#">Forgot password?</a>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:8000/api/v1";

    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const resultPre = document.getElementById("result");
        const resultContainer = document.getElementById("resultContainer");

        // Basic frontend validation
        if (!email || !password) {
            resultContainer.style.display = "block";
            resultPre.innerHTML = JSON.stringify({ error: "Please fill in both email and password" }, null, 2);
            resultPre.style.background = "#7f1d1d";
            resultPre.style.color = "#fecaca";
            return;
        }

        const payload = {
            email: email,
            password: password
        };

        // Show loading state inside result block
        resultContainer.style.display = "block";
        resultPre.innerHTML = "🔐 Authenticating...";
        resultPre.style.background = "#1e293b";
        resultPre.style.color = "#94a3b8";

        try {
            const response = await fetch(`${API}/auth/login`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.access_token) {
                // Store tokens exactly as original logic requires
                localStorage.setItem("access_token", data.access_token);
                localStorage.setItem("refresh_token", data.refresh_token);

                // Display beautiful success message
                resultPre.innerHTML = JSON.stringify({ message: "✅ Login successful! Redirecting...", status: "success" }, null, 2);
                resultPre.style.background = "#064e3b";
                resultPre.style.color = "#a7f3d0";
                
                // Add a small delay before redirect for smooth UX
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                // Error handling: show detailed server error
                let errorMsg = "Authentication failed";
                if (data.detail) {
                    errorMsg = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail);
                } else {
                    errorMsg = JSON.stringify(data, null, 2);
                }
                resultPre.innerHTML = JSON.stringify({ error: errorMsg }, null, 2);
                resultPre.style.background = "#7f1d1d";
                resultPre.style.color = "#fecaca";
            }
        } catch (error) {
            console.error("Login network error:", error);
            resultPre.innerHTML = JSON.stringify({ 
                error: "Network error: Could not connect to MealSight API", 
                details: error.message 
            }, null, 2);
            resultPre.style.background = "#7f1d1d";
            resultPre.style.color = "#fecaca";
        }
    }

    // Allow pressing "Enter" key to submit login
    const passwordInput = document.getElementById("password");
    const emailInput = document.getElementById("email");
    
    function handleKeyPress(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            login();
        }
    }
    
    passwordInput.addEventListener("keypress", handleKeyPress);
    emailInput.addEventListener("keypress", handleKeyPress);
    
    // optional: focus on email field on load
    window.addEventListener("DOMContentLoaded", () => {
        emailInput.focus();
        // Clear any leftover result container style if needed
        const resultContainerElem = document.getElementById("resultContainer");
        resultContainerElem.style.display = "none";
    });
</script>

</body>
</html>
